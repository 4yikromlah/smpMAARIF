<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detail Ujian | CBT System</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        body{font-family:'Inter',sans-serif;background:#eef0f5;padding:2rem}
        .container{max-width:1200px;margin:0 auto}
        .card{background:#eef0f5;border-radius:32px;padding:1.5rem;box-shadow:12px 12px 24px #bebebe,-8px -8px 18px #ffffff;margin-bottom:1.5rem}
        h1{color:#2d2a4a}
        table{width:100%;border-collapse:collapse}
        th,td{padding:12px;border-bottom:1px solid #ccc}
        .btn-back{display:inline-block;background:#eef0f5;padding:0.6rem 1.5rem;border-radius:40px;text-decoration:none;color:#4a3570;margin-bottom:1rem;box-shadow:6px 6px 12px #bebebe,-4px -4px 8px #ffffff}
        .nilai-bagus{background:#10b981;color:white;padding:2px 10px;border-radius:40px;display:inline-block}
        .nilai-sedang{background:#f59e0b;color:white;padding:2px 10px;border-radius:40px;display:inline-block}
        .nilai-kurang{background:#ef4444;color:white;padding:2px 10px;border-radius:40px;display:inline-block}
    </style>
</head>
<body>
<div class="container">
    <a href="dashboard_guru.html" class="btn-back"><i class="fas fa-arrow-left"></i> Kembali</a>
    <div class="card" id="infoCard">
        <h1><i class="fas fa-file-alt"></i> <span id="namaUjian">Loading...</span></h1>
        <p><strong>Mata Pelajaran:</strong> <span id="mapelUjian">-</span></p>
        <p><strong>Waktu:</strong> <span id="waktuUjian">-</span></p>
        <p><strong>Durasi:</strong> <span id="durasiUjian">-</span> menit</p>
    </div>
    <div class="card">
        <h3>Daftar Nilai Siswa</h3>
        <table id="nilaiSiswa">
            <thead><tr><th>No</th><th>NIS</th><th>Nama</th><th>Kelas</th><th>Nilai</th><th>Waktu Selesai</th></tr></thead>
            <tbody></tbody>
        </table>
    </div>
</div>
<script>
    const API_BASE = 'http://localhost:3000';
    const ujianId = new URLSearchParams(location.search).get('id');
    async function loadDetail() {
        if (!ujianId) return;
        const res = await fetch(`${API_BASE}/api/ujian/${ujianId}?include_nilai=true`, { credentials: 'include' });
        const data = await res.json();
        document.getElementById('namaUjian').innerText = data.nama_ujian;
        document.getElementById('mapelUjian').innerText = data.mata_pelajaran?.nama_mapel || '-';
        document.getElementById('waktuUjian').innerText = `${new Date(data.tanggal_mulai).toLocaleString()} - ${new Date(data.tanggal_akhir).toLocaleString()}`;
        document.getElementById('durasiUjian').innerText = data.durasi_menit;
        const tbody = document.querySelector('#nilaiSiswa tbody');
        tbody.innerHTML = '';
        (data.nilai_siswa || []).forEach((ns, i) => {
            const nilaiClass = ns.nilai_total >= 85 ? 'nilai-bagus' : (ns.nilai_total >= 70 ? 'nilai-sedang' : 'nilai-kurang');
            tbody.innerHTML += `<tr>
                <td>${i+1}</td>
                <td>${ns.siswa?.nis || '-'}</td>
                <td>${ns.siswa?.nama_lengkap || '-'}</td>
                <td>${ns.siswa?.kelas?.nama_kelas || '-'}</td>
                <td><span class="${nilaiClass}">${ns.nilai_total}</span></td>
                <td>${ns.selesai_pada ? new Date(ns.selesai_pada).toLocaleString() : '-'}</td>
            </tr>`;
        });
    }
    loadDetail();
</script>
</body>
</html>
