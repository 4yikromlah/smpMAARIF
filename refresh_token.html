<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Refresh Token - CBT System</title>
    <style>
        body { font-family: 'Inter', sans-serif; background: #eef0f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .card { background: #eef0f5; border-radius: 48px; padding: 2rem; text-align: center; box-shadow: 20px 20px 40px #bebebe, -10px -10px 20px #ffffff; max-width: 500px; }
        .token-list { background: #2d2a4a; color: #eef0f5; padding: 1rem; border-radius: 24px; text-align: left; margin: 1rem 0; font-family: monospace; }
        .btn { background: linear-gradient(145deg, #7d64a8, #5a3e7c); color: white; border: none; padding: 10px 28px; border-radius: 60px; cursor: pointer; }
    </style>
</head>
<body>
<div class="card">
    <h2><i class="fas fa-sync-alt"></i> Refresh Token Ujian</h2>
    <p>Generate token baru untuk ujian yang sedang aktif</p>
    <div class="token-list" id="tokenResult">Loading...</div>
    <button class="btn" onclick="refreshToken()"><i class="fas fa-sync-alt"></i> Refresh Token</button>
</div>
<script>
    const API_BASE = 'http://localhost:3000';
    async function refreshToken() {
        const res = await fetch(`${API_BASE}/api/token/refresh`, { method: 'POST', credentials: 'include' });
        const data = await res.json();
        document.getElementById('tokenResult').innerHTML = `<strong>Response:</strong><br>${JSON.stringify(data, null, 2)}`;
    }
    refreshToken();
</script>
</body>
</html>
